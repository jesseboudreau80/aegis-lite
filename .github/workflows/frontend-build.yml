name: Frontend Build

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"

jobs:
  build:
    name: Next.js Build & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Stub vars so Next.js build doesn't fail on missing envs
          API_URL: "http://localhost:8100"
        run: npm run build
